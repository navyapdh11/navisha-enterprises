services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: navisha
      POSTGRES_USER: navisha
      POSTGRES_PASSWORD: ${DB_PASSWORD:-navisha_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navisha"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: navisha
      DB_USERNAME: navisha
      DB_PASSWORD: ${DB_PASSWORD:-navisha_secret}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      APP_ENV: production
      APP_DEBUG: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api
      NEXT_PUBLIC_AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    environment:
      LARAVEL_API_URL: http://backend:8000/api
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "8001:8001"

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: php artisan queue:work --queue=high,default,low --tries=3
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
